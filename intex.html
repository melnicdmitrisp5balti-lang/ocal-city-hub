<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local City Hub - Render</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; }
        .code-font { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .topic-card { transition: all 0.3s ease; animation: slideIn 0.5s ease-out; }
        .topic-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .live-indicator { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        .code-block { position: relative; }
        .copy-btn { position: absolute; top: 8px; right: 8px; opacity: 0; transition: opacity 0.2s; }
        .code-block:hover .copy-btn { opacity: 1; }
        pre[class*="language-"] { border-radius: 0.5rem; margin: 0; }
        .settings-panel { transform: translateX(100%); transition: transform 0.3s ease; }
        .settings-panel.open { transform: translateX(0); }
        .toast { transform: translateX(100%); transition: transform 0.3s ease; }
        .toast.show { transform: translateX(0); }
        .status-connected { background: rgba(34, 197, 94, 0.2); color: #4ade80; border-color: rgba(34, 197, 94, 0.3); }
        .status-disconnected { background: rgba(239, 68, 68, 0.2); color: #f87171; border-color: rgba(239, 68, 68, 0.3); }
        .status-connecting { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border-color: rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="text-slate-200">

    <!-- Toast -->
    <div id="toast" class="toast fixed top-4 right-4 z-[60] bg-green-500 text-white px-6 py-3 rounded-lg shadow-xl flex items-center gap-2 font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        <span id="toastMessage">Готово!</span>
    </div>

    <!-- Settings Button -->
    <button onclick="app.toggleSettings()" class="fixed top-4 right-4 z-50 p-3 bg-slate-800/80 hover:bg-slate-700 rounded-full border border-slate-600 transition-all shadow-lg">
        <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
    </button>

    <!-- Settings Panel -->
    <div id="settingsPanel" class="settings-panel fixed top-0 right-0 h-full w-96 glass-panel z-50 border-l border-slate-700 shadow-2xl overflow-y-auto">
        <div class="p-6">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-white">Настройки</h2>
                <button onclick="app.toggleSettings()" class="text-slate-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>

            <!-- Connection Status -->
            <div class="mb-6 p-4 bg-slate-800/50 rounded-lg border border-slate-700">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm font-medium text-slate-400">Статус сервера</span>
                    <span id="connectionStatus" class="text-xs px-2 py-1 rounded-full status-disconnected">Отключено</span>
                </div>
                <div class="text-xs text-slate-500" id="connectionInfo">Нажмите "Подключиться"</div>
            </div>

            <!-- Room ID -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-blue-300 mb-2">ID комнаты</label>
                <div class="flex gap-2">
                    <input type="text" id="roomId" class="flex-1 px-3 py-2 bg-slate-900/80 border border-slate-600 rounded-lg text-white font-mono text-sm uppercase">
                    <button onclick="app.connect()" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-medium">Подключиться</button>
                </div>
                <p class="text-xs text-slate-500 mt-2">Все с одинаковым ID видят одни данные</p>
            </div>

            <button onclick="app.createNewRoom()" class="w-full mb-6 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-lg transition-colors text-sm">🎲 Создать новую комнату</button>

            <!-- Role -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-slate-400 mb-3">Ваша роль</label>
                <div class="space-y-2">
                    <button onclick="app.setRole('admin')" id="roleAdmin" class="w-full p-4 rounded-lg border-2 border-slate-600 hover:border-orange-500 transition-all flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-orange-500/20 flex items-center justify-center">
                            <svg class="w-5 h-5 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                        </div>
                        <div class="text-left">
                            <div class="font-semibold text-white">Администратор</div>
                            <div class="text-xs text-slate-400">Могу публиковать</div>
                        </div>
                    </button>
                    <button onclick="app.setRole('viewer')" id="roleViewer" class="w-full p-4 rounded-lg border-2 border-slate-600 hover:border-blue-500 transition-all flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center">
                            <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </div>
                        <div class="text-left">
                            <div class="font-semibold text-white">Наблюдатель</div>
                            <div class="text-xs text-slate-400">Только просмотр</div>
                        </div>
                    </button>
                </div>
            </div>

            <!-- Admin Auth -->
            <div id="adminAuthSection" class="mb-6 hidden">
                <label class="block text-sm font-medium text-slate-400 mb-2">Пароль админа</label>
                <div class="flex gap-2">
                    <input type="password" id="adminPassword" placeholder="admin123" class="flex-1 px-3 py-2 bg-slate-800/50 border border-slate-600 rounded-lg text-white text-sm">
                    <button onclick="app.verifyAdmin()" class="px-4 py-2 bg-orange-600 hover:bg-orange-500 text-white rounded-lg text-sm">Войти</button>
                </div>
                <p id="authError" class="text-red-400 text-xs mt-2 hidden">Неверный пароль</p>
            </div>

            <!-- Share -->
            <div class="mb-6 p-4 bg-green-500/10 rounded-lg border border-green-500/20">
                <p class="text-sm text-green-300 mb-2">Пригласите коллег</p>
                <div class="flex gap-2">
                    <code id="shareRoomId" class="flex-1 px-3 py-2 bg-slate-900/80 rounded-lg text-green-400 font-mono text-center text-lg">...</code>
                    <button onclick="app.copyRoomId()" class="p-2 bg-green-600 hover:bg-green-500 rounded-lg">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    </button>
                </div>
                <button onclick="app.copyInstructions()" class="w-full mt-2 py-2 bg-green-600/20 hover:bg-green-600/30 border border-green-500/30 text-green-300 rounded-lg text-sm">Копировать инструкцию для коллег</button>
            </div>

            <div class="border-t border-slate-700 pt-4 text-center">
                <div class="text-2xl font-bold text-blue-400" id="topicsCountDisplay">0</div>
                <div class="text-xs text-slate-500">Тем в комнате</div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="min-h-screen flex flex-col">
        <header class="glass-panel sticky top-0 z-40 border-b border-slate-700/50">
            <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center shadow-lg">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-white">Local City Hub</h1>
                        <div class="flex items-center gap-2">
                            <span id="roleBadge" class="text-xs px-2 py-0.5 rounded-full bg-slate-700 text-slate-300">Наблюдатель</span>
                            <span id="roomBadge" class="text-xs px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-300 font-mono">...</span>
                            <span id="liveBadge" class="hidden text-xs px-2 py-0.5 rounded-full bg-green-500/20 text-green-400 flex items-center gap-1">
                                <span class="w-1.5 h-1.5 rounded-full bg-green-400 live-indicator"></span>
                                LIVE
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8">
            <!-- Admin Panel -->
            <div id="adminPanel" class="hidden mb-8">
                <div class="glass-panel rounded-2xl p-6 border border-orange-500/20">
                    <h2 class="text-lg font-semibold text-white mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        Создать тему
                    </h2>
                    <form id="topicForm" class="space-y-4">
                        <input type="text" id="topicTitle" required placeholder="Заголовок..." class="w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-lg text-white placeholder-slate-500">
                        <div class="grid grid-cols-2 gap-4">
                            <select id="blockType" onchange="app.toggleBlockType()" class="w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-lg text-white">
                                <option value="text">Текст</option>
                                <option value="code">Код</option>
                            </select>
                            <select id="codeLanguage" class="hidden w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-lg text-white">
                                <option value="javascript">JavaScript</option>
                                <option value="python">Python</option>
                                <option value="css">CSS</option>
                                <option value="markup">HTML</option>
                                <option value="sql">SQL</option>
                                <option value="bash">Bash</option>
                            </select>
                        </div>
                        <textarea id="topicContent" required rows="6" placeholder="Содержимое..." class="w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-lg text-white placeholder-slate-500 code-font resize-y"></textarea>
                        <button type="submit" class="w-full bg-gradient-to-r from-orange-600 to-orange-500 hover:from-orange-500 hover:to-orange-400 text-white font-semibold py-3 rounded-lg transition-all flex items-center justify-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                            Опубликовать для всех
                        </button>
                    </form>
                </div>
            </div>

            <!-- Topics -->
            <div class="space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-2xl font-bold text-white">Городские темы</h2>
                    <span id="topicsCount" class="text-slate-400 text-sm">0 тем</span>
                </div>
                <div id="topicsContainer" class="space-y-4"></div>
                <div id="emptyState" class="text-center py-16">
                    <div class="w-24 h-24 bg-slate-800/50 rounded-full mx-auto mb-4 flex items-center justify-center">
                        <svg class="w-12 h-12 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                    </div>
                    <p class="text-slate-500">Нет тем. Подключитесь к комнате или создайте новую.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        class LocalCityHub {
            constructor() {
                this.password = 'admin123';
                this.role = localStorage.getItem('role') || 'viewer';
                this.isAuthenticated = sessionStorage.getItem('adminAuth') === 'true';
                this.roomId = localStorage.getItem('roomId') || this.generateRoomId();
                this.topics = [];
                this.socket = null;
                this.isConnected = false;
                
                this.init();
            }

            init() {
                this.updateUI();
                this.setupForm();
            }

            generateRoomId() {
                const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                let result = '';
                for (let i = 0; i < 6; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return result;
            }

            connect() {
                const roomId = document.getElementById('roomId').value.trim().toUpperCase();
                if (!roomId) {
                    this.showToast('Введите ID комнаты');
                    return;
                }

                this.roomId = roomId;
                localStorage.setItem('roomId', this.roomId);
                this.updateUI();

                // Подключаемся к серверу через Socket.io
                this.socket = io();
                
                this.updateConnectionStatus('connecting', 'Подключение...');

                this.socket.on('connect', () => {
                    this.isConnected = true;
                    this.socket.emit('join-room', this.roomId);
                    this.updateConnectionStatus('connected', 'Подключено к серверу');
                    document.getElementById('liveBadge').classList.remove('hidden');
                    this.showToast('Подключено к комнате: ' + this.roomId);
                });

                this.socket.on('disconnect', () => {
                    this.isConnected = false;
                    this.updateConnectionStatus('disconnected', 'Отключено');
                    document.getElementById('liveBadge').classList.add('hidden');
                });

                this.socket.on('topics', (topics) => {
                    this.topics = topics;
                    this.renderTopics();
                });

                this.socket.on('new-topic', (topic) => {
                    this.topics.unshift(topic);
                    this.renderTopics();
                    if (this.role !== 'admin') {
                        this.showToast('Новая тема от администратора!');
                    }
                });

                this.socket.on('delete-topic', (topicId) => {
                    this.topics = this.topics.filter(t => t.id !== topicId);
                    this.renderTopics();
                });

                this.socket.on('user-joined', () => {
                    // Можно показать уведомление о новом пользователе
                });
            }

            createTopic() {
                if (!this.isConnected) {
                    this.showToast('Сначала подключитесь к комнате');
                    return;
                }
                
                if (this.role !== 'admin' || !this.isAuthenticated) {
                    this.showToast('Только администратор может публиковать');
                    return;
                }
                
                const title = document.getElementById('topicTitle').value.trim();
                const type = document.getElementById('blockType').value;
                const content = document.getElementById('topicContent').value.trim();
                const language = document.getElementById('codeLanguage').value;

                if (!title || !content) {
                    this.showToast('Заполните все поля');
                    return;
                }

                const topic = {
                    title,
                    type,
                    content,
                    language: type === 'code' ? language : null,
                    author: 'Администратор',
                    timestamp: Date.now()
                };

                this.socket.emit('new-topic', { roomId: this.roomId, topic });
                this.clearForm();
                this.showToast('✅ Опубликовано для всех в комнате!');
            }

            deleteTopic(id) {
                if (!this.isConnected) return;
                if (!confirm('Удалить тему для всех?')) return;
                
                this.socket.emit('delete-topic', { roomId: this.roomId, topicId: id });
            }

            // UI Methods
            toggleSettings() {
                document.getElementById('settingsPanel').classList.toggle('open');
            }

            updateConnectionStatus(status, text) {
                const badge = document.getElementById('connectionStatus');
                const info = document.getElementById('connectionInfo');
                
                badge.className = `text-xs px-2 py-1 rounded-full status-${status}`;
                badge.textContent = status === 'connected' ? 'Подключено' : status === 'connecting' ? 'Подключение...' : 'Отключено';
                info.textContent = text;
            }

            createNewRoom() {
                this.roomId = this.generateRoomId();
                localStorage.setItem('roomId', this.roomId);
                this.updateUI();
                this.showToast('Создана комната: ' + this.roomId + '. Нажмите "Подключиться"');
            }

            setRole(role) {
                this.role = role;
                localStorage.setItem('role', role);
                
                document.getElementById('roleAdmin').classList.toggle('border-orange-500', role === 'admin');
                document.getElementById('roleViewer').classList.toggle('border-blue-500', role === 'viewer');
                
                if (role === 'admin') {
                    document.getElementById('adminAuthSection').classList.remove('hidden');
                    if (this.isAuthenticated) this.showAdminPanel();
                } else {
                    document.getElementById('adminAuthSection').classList.add('hidden');
                    this.hideAdminPanel();
                }
            }

            verifyAdmin() {
                const input = document.getElementById('adminPassword').value;
                if (input === this.password) {
                    this.isAuthenticated = true;
                    sessionStorage.setItem('adminAuth', 'true');
                    document.getElementById('authError').classList.add('hidden');
                    this.showAdminPanel();
                    this.showToast('Вход выполнен! Можете публиковать');
                } else {
                    document.getElementById('authError').classList.remove('hidden');
                }
            }

            showAdminPanel() {
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('roleBadge').textContent = 'Администратор';
                document.getElementById('roleBadge').className = 'text-xs px-2 py-0.5 rounded-full bg-orange-500/20 text-orange-300';
            }

            hideAdminPanel() {
                document.getElementById('adminPanel').classList.add('hidden');
                document.getElementById('roleBadge').textContent = 'Наблюдатель';
                document.getElementById('roleBadge').className = 'text-xs px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-300';
            }

            updateUI() {
                document.getElementById('roomId').value = this.roomId;
                document.getElementById('shareRoomId').textContent = this.roomId;
                document.getElementById('roomBadge').textContent = this.roomId;
                
                this.setRole(this.role);
                if (this.isAuthenticated && this.role === 'admin') {
                    this.showAdminPanel();
                }
            }

            copyRoomId() {
                navigator.clipboard.writeText(this.roomId).then(() => {
                    this.showToast('ID скопирован: ' + this.roomId);
                });
            }

            copyInstructions() {
                const url = window.location.href;
                const text = `
🚀 Local City Hub - Подключение

Ссылка: ${url}
ID комнаты: ${this.roomId}

Как подключиться:
1. Откройте ссылку
2. Нажмите ⚙️ Настройки (справа сверху)
3. Введите ID комнаты: ${this.roomId}
4. Нажмите "Подключиться"
5. Выберите "Наблюдатель"

                `.trim();
                
                navigator.clipboard.writeText(text).then(() => {
                    this.showToast('Инструкция скопирована!');
                });
            }

            showToast(msg) {
                const toast = document.getElementById('toast');
                document.getElementById('toastMessage').textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }

            clearForm() {
                document.getElementById('topicForm').reset();
                this.toggleBlockType();
            }

            toggleBlockType() {
                const type = document.getElementById('blockType').value;
                const langSelect = document.getElementById('codeLanguage');
                const textarea = document.getElementById('topicContent');
                
                if (type === 'code') {
                    langSelect.classList.remove('hidden');
                    textarea.classList.add('code-font');
                } else {
                    langSelect.classList.add('hidden');
                    textarea.classList.remove('code-font');
                }
            }

            setupForm() {
                document.getElementById('topicForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.createTopic();
                });
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            renderTopics() {
                const container = document.getElementById('topicsContainer');
                const emptyState = document.getElementById('emptyState');
                
                document.getElementById('topicsCount').textContent = this.topics.length + ' тем';
                document.getElementById('topicsCountDisplay').textContent = this.topics.length;

                if (this.topics.length === 0) {
                    container.innerHTML = '';
                    emptyState.classList.remove('hidden');
                    return;
                }

                emptyState.classList.add('hidden');
                container.innerHTML = this.topics.map(topic => {
                    const isCode = topic.type === 'code';
                    const contentHtml = isCode 
                        ? `<div class="code-block relative"><button onclick="app.copyCode('${topic.id}')" class="copy-btn bg-slate-700 hover:bg-slate-600 text-white text-xs px-3 py-1.5 rounded-md">Копировать</button><pre class="language-${topic.language}"><code class="language-${topic.language}">${this.escapeHtml(topic.content)}</code></pre></div>`
                        : `<div class="text-slate-300 whitespace-pre-wrap">${this.escapeHtml(topic.content)}</div>`;
                    
                    const typeBadge = isCode 
                        ? `<span class="px-3 py-1 rounded-full bg-purple-500/20 text-purple-300 text-xs">${topic.language.toUpperCase()}</span>`
                        : `<span class="px-3 py-1 rounded-full bg-blue-500/20 text-blue-300 text-xs">Текст</span>`;

                    const deleteBtn = this.role === 'admin' && this.isAuthenticated
                        ? `<button onclick="app.deleteTopic('${topic.id}')" class="text-slate-500 hover:text-red-400 p-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>`
                        : '';

                    return `
                        <article class="glass-panel rounded-xl p-6 border border-slate-700/50">
                            <div class="flex items-start justify-between mb-4">
                                <div>
                                    <div class="flex items-center gap-3 mb-2">${typeBadge}<span class="text-xs text-slate-500">${topic.date || new Date(topic.timestamp).toLocaleString('ru-RU')}</span></div>
                                    <h3 class="text-xl font-bold text-white">${this.escapeHtml(topic.title)}</h3>
                                </div>
                                ${deleteBtn}
                            </div>
                            <div class="mt-4">${contentHtml}</div>
                        </article>
                    `;
                }).join('');
                
                Prism.highlightAll();
            }

            copyCode(id) {
                const topic = this.topics.find(t => t.id === id);
                if (topic) {
                    navigator.clipboard.writeText(topic.content).then(() => this.showToast('Код скопирован!'));
                }
            }
        }

        const app = new LocalCityHub();
    </script>
</body>
