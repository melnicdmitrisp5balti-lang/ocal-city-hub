<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local City Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; }
        .code-font { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        pre[class*="language-"] { border-radius: 0.5rem; margin: 0; }

        /* Accordion */
        .topic-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease, opacity 0.3s ease; opacity: 0; }
        .topic-body.open { max-height: 4000px; opacity: 1; }
        .chevron { transition: transform 0.3s ease; }
        .chevron.open { transform: rotate(180deg); }

        /* Toast */
        .toast { transform: translateX(120%); transition: transform 0.3s ease; }
        .toast.show { transform: translateX(0); }

        /* Admin panel slide */
        .admin-slide { transform: translateX(100%); transition: transform 0.3s ease; }
        .admin-slide.open { transform: translateX(0); }

        /* Topic card */
        .topic-card { animation: fadeUp 0.4s ease-out both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

        /* Search highlight */
        mark { background: rgba(59,130,246,0.35); color: #93c5fd; border-radius: 2px; padding: 0 2px; }

        /* Copy btn */
        .code-wrap { position: relative; }
        .copy-btn { position: absolute; top: 8px; right: 8px; opacity: 0; transition: opacity 0.2s; }
        .code-wrap:hover .copy-btn { opacity: 1; }

        /* Block separator */
        .block-item + .block-item { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.07); }
    </style>
</head>
<body class="text-slate-200">

<!-- Toast -->
<div id="toast" class="toast fixed top-4 right-4 z-[60] bg-green-500 text-white px-5 py-3 rounded-lg shadow-xl flex items-center gap-2 font-medium text-sm">
    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    <span id="toastMsg">Готово!</span>
</div>

<!-- Admin side panel -->
<div id="adminPanel" class="admin-slide fixed top-0 right-0 h-full w-[420px] glass-panel z-50 border-l border-slate-700 shadow-2xl overflow-y-auto">
    <div class="p-6">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-lg font-bold text-white">Панель администратора</h2>
            <button onclick="closeAdmin()" class="text-slate-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <!-- Auth -->
        <div id="authBox" class="mb-6">
            <label class="block text-sm text-slate-400 mb-2">Пароль</label>
            <div class="flex gap-2">
                <input type="password" id="pwInput" placeholder="dima12311" class="flex-1 px-3 py-2 bg-slate-900/80 border border-slate-600 rounded-lg text-white text-sm">
                <button onclick="verifyPw()" class="px-4 py-2 bg-orange-600 hover:bg-orange-500 text-white rounded-lg text-sm font-medium">Войти</button>
            </div>
            <p id="pwError" class="text-red-400 text-xs mt-2 hidden">Неверный пароль</p>
        </div>

        <!-- Create form -->
        <div id="createBox" class="hidden space-y-4">
            <p class="text-sm text-green-400 font-medium">✅ Вы вошли как администратор</p>

            <div>
                <label class="block text-sm text-slate-400 mb-1">Название темы</label>
                <input type="text" id="fTitle" placeholder="Заголовок..." class="w-full px-3 py-2 bg-slate-900/80 border border-slate-600 rounded-lg text-white text-sm">
            </div>

            <!-- Blocks list -->
            <div id="blocksList" class="space-y-3"></div>

            <!-- Add block buttons -->
            <div class="flex gap-2 flex-wrap">
                <button onclick="addBlock('text')" class="flex items-center gap-1 px-3 py-1.5 bg-blue-600/30 hover:bg-blue-600/50 border border-blue-500/40 text-blue-300 rounded-lg text-xs font-medium">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/></svg>
                    + Текст
                </button>
                <button onclick="addBlock('code')" class="flex items-center gap-1 px-3 py-1.5 bg-purple-600/30 hover:bg-purple-600/50 border border-purple-500/40 text-purple-300 rounded-lg text-xs font-medium">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
                    + Код
                </button>
            </div>

            <button onclick="publishTopic()" class="w-full bg-gradient-to-r from-orange-600 to-orange-500 hover:from-orange-500 hover:to-orange-400 text-white font-semibold py-3 rounded-lg transition-all text-sm flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                Опубликовать
            </button>
        </div>
    </div>
</div>

<!-- Header -->
<header class="glass-panel sticky top-0 z-40 border-b border-slate-700/50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center shadow-lg shrink-0">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
            </div>
            <h1 class="text-lg font-bold text-white">Local City Hub</h1>
        </div>

        <!-- Search -->
        <div class="flex-1 max-w-sm relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/></svg>
            <input id="searchInput" type="text" placeholder="Поиск по названию..." oninput="renderTopics()" class="w-full pl-9 pr-4 py-2 bg-slate-800/60 border border-slate-600/60 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:border-blue-500">
        </div>

        <!-- Admin button -->
        <button onclick="openAdmin()" class="shrink-0 p-2.5 bg-slate-800/80 hover:bg-slate-700 rounded-lg border border-slate-600 transition-all" title="Панель администратора">
            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
    </div>
</header>

<!-- Main -->
<main class="max-w-4xl mx-auto px-4 py-8">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold text-white">Темы</h2>
        <span id="topicsCount" class="text-slate-400 text-sm">0 тем</span>
    </div>

    <div id="topicsContainer" class="space-y-3"></div>

    <div id="emptyState" class="text-center py-20">
        <div class="w-20 h-20 bg-slate-800/50 rounded-full mx-auto mb-4 flex items-center justify-center">
            <svg class="w-10 h-10 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        </div>
        <p class="text-slate-500 text-sm">Тем пока нет</p>
    </div>
</main>

<script>
// ── State ──────────────────────────────────────────────
const ADMIN_PW = 'admin123';
let isAdmin = sessionStorage.getItem('adminAuth') === 'true';
let topics = [];
let blockCounter = 0;
let socket = null;

// ── Socket ─────────────────────────────────────────────
const ROOM = 'global';

function connectSocket() {
    try {
        socket = io();
        socket.on('connect', () => {
            socket.emit('join-room', ROOM);
        });
        socket.on('topics', (data) => { topics = data; renderTopics(); });
        socket.on('new-topic', (t) => { topics.unshift(t); renderTopics(); showToast('Новая тема: ' + t.title); });
        socket.on('delete-topic', (id) => { topics = topics.filter(t => t.id !== id); renderTopics(); });
    } catch(e) {}
}
connectSocket();

// ── Admin panel ────────────────────────────────────────
function openAdmin() {
    document.getElementById('adminPanel').classList.add('open');
    if (isAdmin) showCreateBox();
}
function closeAdmin() {
    document.getElementById('adminPanel').classList.remove('open');
}
function verifyPw() {
    const val = document.getElementById('pwInput').value;
    if (val === ADMIN_PW) {
        isAdmin = true;
        sessionStorage.setItem('adminAuth', 'true');
        document.getElementById('pwError').classList.add('hidden');
        showCreateBox();
    } else {
        document.getElementById('pwError').classList.remove('hidden');
    }
}
function showCreateBox() {
    document.getElementById('authBox').classList.add('hidden');
    document.getElementById('createBox').classList.remove('hidden');
}

// ── Blocks builder ─────────────────────────────────────
function addBlock(type) {
    const id = ++blockCounter;
    const list = document.getElementById('blocksList');
    const div = document.createElement('div');
    div.id = 'block-' + id;
    div.className = 'bg-slate-900/60 border border-slate-700 rounded-xl p-3 space-y-2';

    if (type === 'text') {
        div.innerHTML = `
            <div class="flex items-center justify-between">
                <span class="text-xs text-blue-300 font-medium uppercase tracking-wide">Текст</span>
                <button onclick="removeBlock(${id})" class="text-slate-500 hover:text-red-400 text-xs">✕</button>
            </div>
            <textarea rows="4" placeholder="Введите текст..." class="w-full px-3 py-2 bg-slate-800 border border-slate-600 rounded-lg text-white text-sm placeholder-slate-500 resize-y code-font" data-btype="text"></textarea>`;
    } else {
        div.innerHTML = `
            <div class="flex items-center justify-between gap-2">
                <span class="text-xs text-purple-300 font-medium uppercase tracking-wide">Код</span>
                <select class="px-2 py-1 bg-slate-800 border border-slate-600 rounded-lg text-white text-xs" data-lang>
                    <option value="javascript">JavaScript</option>
                    <option value="python">Python</option>
                    <option value="css">CSS</option>
                    <option value="markup">HTML</option>
                    <option value="sql">SQL</option>
                    <option value="bash">Bash</option>
                </select>
                <button onclick="removeBlock(${id})" class="text-slate-500 hover:text-red-400 text-xs ml-auto">✕</button>
            </div>
            <textarea rows="5" placeholder="Вставьте код..." class="w-full px-3 py-2 bg-slate-800 border border-slate-600 rounded-lg text-white text-sm placeholder-slate-500 resize-y code-font" data-btype="code"></textarea>`;
    }
    list.appendChild(div);
}
function removeBlock(id) {
    document.getElementById('block-' + id)?.remove();
}

// ── Publish ────────────────────────────────────────────
function publishTopic() {
    const title = document.getElementById('fTitle').value.trim();
    if (!title) { showToast('Введите название'); return; }

    const blockEls = document.querySelectorAll('#blocksList > div');
    const blocks = [];
    blockEls.forEach(el => {
        const ta = el.querySelector('textarea');
        const content = ta?.value.trim();
        if (!content) return;
        const btype = ta.dataset.btype;
        const lang = btype === 'code' ? (el.querySelector('[data-lang]')?.value || 'javascript') : null;
        blocks.push({ type: btype, content, language: lang });
    });

    if (blocks.length === 0) { showToast('Добавьте хотя бы один блок'); return; }

    const topic = { title, blocks, timestamp: Date.now(), date: new Date().toLocaleString('ru-RU') };

    if (socket && socket.connected) {
        socket.emit('new-topic', { roomId: ROOM, topic });
    } else {
        topic.id = Date.now().toString();
        topics.unshift(topic);
        renderTopics();
    }

    // Reset
    document.getElementById('fTitle').value = '';
    document.getElementById('blocksList').innerHTML = '';
    showToast('✅ Тема опубликована!');
}

// ── Render ─────────────────────────────────────────────
function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}
function highlight(text, query) {
    if (!query) return escHtml(text);
    const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
    return escHtml(text).replace(re, '<mark>$1</mark>');
}

function renderTopics() {
    const container = document.getElementById('topicsContainer');
    const empty = document.getElementById('emptyState');
    const q = document.getElementById('searchInput').value.trim().toLowerCase();

    const filtered = q
        ? topics.filter(t => t.title.toLowerCase().includes(q))
        : topics;

    document.getElementById('topicsCount').textContent = filtered.length + ' тем';

    if (filtered.length === 0) {
        container.innerHTML = '';
        empty.classList.remove('hidden');
        return;
    }
    empty.classList.add('hidden');

    container.innerHTML = filtered.map((topic, idx) => {
        // Support old format (single content) and new (blocks array)
        let blocksHtml = '';
        if (topic.blocks && topic.blocks.length) {
            blocksHtml = topic.blocks.map(b => {
                if (b.type === 'code') {
                    return `<div class="block-item">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs px-2 py-0.5 rounded-full bg-purple-500/20 text-purple-300">${(b.language||'code').toUpperCase()}</span>
                        </div>
                        <div class="code-wrap relative">
                            <button onclick="copyText(${JSON.stringify(b.content).replace(/"/g,'&quot;')})" class="copy-btn bg-slate-700 hover:bg-slate-600 text-white text-xs px-3 py-1 rounded-md">Копировать</button>
                            <pre class="language-${b.language}"><code class="language-${b.language}">${escHtml(b.content)}</code></pre>
                        </div>
                    </div>`;
                } else {
                    return `<div class="block-item">
                        <div class="text-slate-300 text-sm whitespace-pre-wrap leading-relaxed">${escHtml(b.content)}</div>
                    </div>`;
                }
            }).join('');
        } else if (topic.content) {
            // legacy
            if (topic.type === 'code') {
                blocksHtml = `<div class="code-wrap relative">
                    <pre class="language-${topic.language}"><code class="language-${topic.language}">${escHtml(topic.content)}</code></pre>
                </div>`;
            } else {
                blocksHtml = `<div class="text-slate-300 text-sm whitespace-pre-wrap leading-relaxed">${escHtml(topic.content)}</div>`;
            }
        }

        const deleteBtn = isAdmin
            ? `<button onclick="deleteTopic('${topic.id}')" class="shrink-0 text-slate-500 hover:text-red-400 p-1.5 transition-colors" title="Удалить">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
               </button>`
            : '';

        return `
        <article class="topic-card glass-panel rounded-xl border border-slate-700/50 overflow-hidden" style="animation-delay:${idx*0.04}s">
            <!-- Header (clickable) -->
            <button onclick="toggleTopic('body-${topic.id}')" class="w-full flex items-center gap-3 px-5 py-4 hover:bg-white/5 transition-colors text-left">
                <svg class="chevron w-4 h-4 text-slate-400 shrink-0" id="chev-${topic.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                <span class="flex-1 font-semibold text-white text-sm leading-snug">${highlight(topic.title, q)}</span>
                <span class="shrink-0 text-xs text-slate-500">${topic.date || new Date(topic.timestamp).toLocaleString('ru-RU')}</span>
                ${deleteBtn}
            </button>
            <!-- Body -->
            <div class="topic-body" id="body-${topic.id}">
                <div class="px-5 pb-5 pt-1 border-t border-slate-700/40">
                    ${blocksHtml}
                </div>
            </div>
        </article>`;
    }).join('');

    Prism.highlightAll();
}

function toggleTopic(bodyId) {
    const body = document.getElementById(bodyId);
    const topicId = bodyId.replace('body-','');
    const chev = document.getElementById('chev-' + topicId);
    body.classList.toggle('open');
    chev.classList.toggle('open');
}

function deleteTopic(id) {
    if (!confirm('Удалить тему?')) return;
    if (socket && socket.connected) {
        socket.emit('delete-topic', { roomId: ROOM, topicId: id });
    } else {
        topics = topics.filter(t => t.id !== id);
        renderTopics();
    }
}

function copyText(text) {
    navigator.clipboard.writeText(text).then(() => showToast('Скопировано!'));
}

function showToast(msg) {
    document.getElementById('toastMsg').textContent = msg;
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
renderTopics();
</script>
</body>
</html>
